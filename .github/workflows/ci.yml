name: Limitless CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - develop
      - feature/**

concurrency:
  group: limitless-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: limitless_testing
          MYSQL_USER: limitless
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_NAME: Limitless
      APP_ENV: testing
      APP_DEBUG: true
      APP_KEY: base64:7kL7b9x1dJ4vYw2mT9K9vBv0x6mJm6s9nD3kP2fR4aA=
      APP_URL: http://localhost

      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: limitless_testing
      DB_USERNAME: limitless
      DB_PASSWORD: secret

      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      FILESYSTEM_DISK: local
      LOG_CHANNEL: stderr

      BCRYPT_ROUNDS: 4

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, mysql, pdo_mysql, bcmath, intl, zip, gd
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run Pint
        run: vendor/bin/pint --test

      - name: Run tests
        run: php artisan test